<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Hồ sơ cá nhân</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>👤 Hồ sơ cá nhân của tôi</h2>
    <div>
      <a href="/customers/history" class="btn btn-outline-info me-2">🕒 Lịch sử thuê</a>
      <a href="/cars" class="btn btn-secondary">Quay lại danh sách xe</a>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm p-4 border-top border-primary border-4">

        <div th:if="${successMsg}" class="alert alert-success fw-bold text-center">
          <span th:text="${successMsg}"></span>
        </div>

        <form th:action="@{/customers/profile/update}" th:object="${customer}" method="post" class="row g-3">

          <h5 class="text-secondary border-bottom pb-2">Thông tin liên hệ</h5>

          <div class="col-md-6">
            <label class="form-label fw-bold">Email (Không thể thay đổi)</label>
            <input type="email" th:field="*{email}" class="form-control bg-light" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Số điện thoại*</label>
            <input type="text" th:field="*{mobile}" class="form-control" required>
          </div>

          <h5 class="text-secondary border-bottom pb-2 mt-4">Thông tin định danh</h5>

          <div class="col-md-6">
            <label class="form-label fw-bold">Họ và Tên*</label>
            <input type="text" th:field="*{customerName}" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Ngày sinh</label>
            <input type="date" th:field="*{birthday}" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">CCCD / CMND*</label>
            <input type="text" th:field="*{identityCard}" class="form-control" required>
          </div>

          <h5 class="text-secondary border-bottom pb-2 mt-4">Thông tin bằng lái xe</h5>

          <div class="col-md-6">
            <label class="form-label fw-bold">Mã số bằng lái (GPLX)*</label>
            <input type="text" th:field="*{licenceNumber}" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Ngày cấp bằng</label>
            <input type="date" th:field="*{licenceDate}" class="form-control">
          </div>

          <div class="col-12 mt-4 text-end">
            <button type="submit" class="btn btn-primary px-5 fw-bold">💾 Lưu Thay Đổi</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
