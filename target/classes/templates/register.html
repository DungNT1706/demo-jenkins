<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thành viên FUCAR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="card shadow-lg p-4" style="width: 600px; border-radius: 15px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">TẠO TÀI KHOẢN MỚI</h2>
        <p class="text-muted">Gia nhập hệ thống thuê xe xịn nhất hệ mặt trời!</p>
    </div>

    <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post" class="row g-3">

        <h5 class="text-secondary border-bottom pb-2">Thông tin đăng nhập</h5>
        <div class="col-md-6">
            <label class="form-label fw-bold">Email (Dùng để đăng nhập)*</label>
            <input type="email" th:field="*{email}" class="form-control" required placeholder="vidu@gmail.com">
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">Mật khẩu*</label>
            <input type="password" th:field="*{password}" class="form-control" required>
        </div>

        <h5 class="text-secondary border-bottom pb-2 mt-4">Thông tin cá nhân</h5>
        <div class="col-md-6">
            <label class="form-label fw-bold">Họ và Tên*</label>
            <input type="text" th:field="*{customerName}" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">Số điện thoại*</label>
            <input type="text" th:field="*{mobile}" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">Ngày sinh</label>
            <input type="date" th:field="*{birthday}" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">CCCD / CMND*</label>
            <input type="text" th:field="*{identityCard}" class="form-control" required>
        </div>

        <h5 class="text-secondary border-bottom pb-2 mt-4">Thông tin bằng lái xe</h5>
        <div class="col-md-6">
            <label class="form-label fw-bold">Mã số bằng lái (GPLX)*</label>
            <input type="text" th:field="*{licenceNumber}" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">Ngày cấp bằng</label>
            <input type="date" th:field="*{licenceDate}" class="form-control">
        </div>

        <div class="col-12 mt-4 text-center">
            <button type="submit" class="btn btn-primary w-100 py-2 fs-5 fw-bold">🚀 ĐĂNG KÝ NGAY</button>
            <div class="mt-3">
                Đã có tài khoản? <a href="/auth/login" class="text-decoration-none">Đăng nhập tại đây</a>
            </div>
        </div>
    </form>
</div>

</body>
</html>
