<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Quản lý Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow" style="max-width: 800px; margin: 0 auto;">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0" th:text="${pageTitle}">Thêm / Sửa Xe</h3>
        </div>

        <div class="card-body">
            <form th:action="@{/cars/save}" th:object="${car}" method="post">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Mã Xe (ID)</label>
                        <input type="text" class="form-control" th:field="*{id}"
                               th:readonly="${car.id != null and car.id != ''}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Tên Xe</label>
                        <input type="text" class="form-control" th:field="*{carName}" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Năm Sản Xuất</label>
                        <input type="number" class="form-control" th:field="*{modelYear}" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Màu Sắc</label>
                        <input type="text" class="form-control" th:field="*{color}" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Số Chỗ Ngồi</label>
                        <input type="number" class="form-control" th:field="*{capacity}" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Ngày Nhập Kho</label>
                        <input type="date" class="form-control" th:field="*{importDate}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Giá Thuê (VND/Ngày)</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{rentPrice}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Mô Tả</label>
                    <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Trạng Thái</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="AVAILABLE">Sẵn sàng (Available)</option>
                            <option value="RENTED">Đang cho thuê (Rented)</option>
                            <option value="DELETED">Ngừng hoạt động (Deleted)</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Mã Nhà Sản Xuất (Producer ID)</label>
                        <input type="text" class="form-control" th:field="*{carProducer.producerId}" required
                               placeholder="Ví dụ: PROD01">
                    </div>
                </div>

                <hr class="mt-4 mb-4">

                <div class="d-flex justify-content-between">
                    <a href="/cars" class="btn btn-secondary">Quay Lại</a>
                    <button type="submit" class="btn btn-success fw-bold">💾 LƯU THÔNG TIN</button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
